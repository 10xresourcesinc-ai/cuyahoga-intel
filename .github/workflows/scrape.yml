name: Cuyahoga County Lead Scraper
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      enable_probate:
        description: "Enable Probate (Playwright) scraping"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    name: Scrape & Export Leads
    runs-on: ubuntu-22.04
    steps:
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      # ----------------------------------------------------------------
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r scraper/requirements.txt

      # ----------------------------------------------------------------
      # Only install Chromium when Probate scraping is explicitly enabled.
      # Skipping this saves ~45s and ~300MB on every normal daily run.
      - name: Install Playwright browsers
        if: ${{ github.event.inputs.enable_probate == 'true' }}
        run: python -m playwright install --with-deps chromium

      # ----------------------------------------------------------------
      - name: Create output directories
        run: |
          mkdir -p dashboard
          mkdir -p data

      # ----------------------------------------------------------------
      - name: Run scraper
        env:
          LOOKBACK_DAYS: "30"
          PYTHONUNBUFFERED: "1"
          COURTLISTENER_TOKEN: ${{ secrets.COURTLISTENER_TOKEN }}
          ENABLE_PROBATE: ${{ github.event.inputs.enable_probate || 'false' }}
        run: python scraper/fetch.py

      # ----------------------------------------------------------------
      - name: Commit and push records
        run: |
          git config --global user.name  "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add dashboard/records.json data/records.json data/ghl_export.csv || true
          git diff --cached --quiet || git commit -m "chore: update leads $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

  # ====================================================================
  deploy-dashboard:
    name: Deploy Dashboard to GitHub Pages
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main   # pick up the freshly committed records.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
